name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  standalone:
    # ROOT-free toolchain. Covers the core build and the graceful
    # "ROOT requested but not installed" configure path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build core without ROOT (QUPID_WITH_ROOT=OFF)
        run: |
          cmake -S . -B build-off -DCMAKE_BUILD_TYPE=Release -DQUPID_WITH_ROOT=OFF
          cmake --build build-off -j"$(nproc)"
      - name: Run core tests
        working-directory: build-off
        run: |
          ./test0_VectorMatrix
          ./test3_digitizer
      - name: Build with ROOT requested but absent (QUPID_WITH_ROOT=ON)
        # ROOT is not present on this runner; the default-ON configure must
        # still succeed by skipping the visualization module.
        run: |
          cmake -S . -B build-on -DCMAKE_BUILD_TYPE=Release -DQUPID_WITH_ROOT=ON
          cmake --build build-on -j"$(nproc)"
